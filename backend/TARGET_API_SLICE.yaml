paths:
  /reports/generate:
    post:
      summary: Generate report (returns structured data)
      operationId: post_reports_generate
  /reports/export/pdf:
    post:
      summary: Generate and export PDF
      operationId: post_reports_export_pdf
  /reports/history:
    get:
      summary: List previously generated reports
      operationId: get_reports_history
  /categories:
    get:
      summary: List all active categories
      operationId: get_categories
  /accounts:
    get:
      summary: List all accounts
      operationId: get_accounts
